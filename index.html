<script>
// --- Local storage-backed shim for the window.storage API used by the app ---
// Data is saved in this browser only (per device). To sync across devices,
// swap this shim for a real backend (e.g. Supabase, Firebase) later.
window.storage = {
  get: async (key, shared) => {
    try {
      const raw = localStorage.getItem("wine-app:" + key);
      if (raw === null) return null;
      return { key, value: raw, shared: !!shared };
    } catch (e) {
      throw e;
    }
  },
  set: async (key, value, shared) => {
    try {
      localStorage.setItem("wine-app:" + key, value);
      return { key, value, shared: !!shared };
    } catch (e) {
      throw e;
    }
  },
  delete: async (key, shared) => {
    try {
      localStorage.removeItem("wine-app:" + key);
      return { key, deleted: true, shared: !!shared };
    } catch (e) {
      throw e;
    }
  },
  list: async (prefix, shared) => {
    try {
      const keys = Object.keys(localStorage)
        .filter(k => k.startsWith("wine-app:" + (prefix || "")))
        .map(k => k.replace("wine-app:", ""));
      return { keys, prefix, shared: !!shared };
    } catch (e) {
      throw e;
    }
  },
};
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// --- Minimal inline icon components (stand-ins for lucide-react, so no bundler/npm install is needed) ---
function IconBase({ children, size = 15, style, ...props }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style} {...props}>
      {children}
    </svg>
  );
}
function Plus(props) { return <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>; }
function Upload(props) { return <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>; }
function Search(props) { return <IconBase {...props}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconBase>; }
function X(props) { return <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>; }
function Pencil(props) { return <IconBase {...props}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></IconBase>; }
function Trash2(props) { return <IconBase {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>; }
function ArrowUpDown(props) { return <IconBase {...props}><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></IconBase>; }
function Check(props) { return <IconBase {...props}><polyline points="20 6 9 17 4 12"/></IconBase>; }
function WineIcon(props) { return <IconBase {...props}><path d="M8 22h8"/><path d="M7 10h10"/><path d="M12 15v7"/><path d="M12 15a5 5 0 0 0 5-5c0-2-1.5-3-1.5-6.5A2.5 2.5 0 0 0 12.5 1h-1A2.5 2.5 0 0 0 9 3.5C9 7 7.5 8 7.5 10a5 5 0 0 0 4.5 5Z"/></IconBase>; }
function AlertCircle(props) { return <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconBase>; }
function ArchiveIcon(props) { return <IconBase {...props}><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><line x1="10" y1="13" x2="14" y2="13"/></IconBase>; }


const TYPE_COLORS = {
  Red: "#8C2F39",
  White: "#C9B458",
  "Rosé": "#E0A199",
  Sparkling: "#CFC9A8",
  Dessert: "#A6672B",
  Fortified: "#5C3A21",
};
const TYPES = Object.keys(TYPE_COLORS);

const FIELD_DEFS = [
  { key: "producer", label: "Producer" },
  { key: "name", label: "Wine" },
  { key: "vintage", label: "Vintage" },
  { key: "type", label: "Type" },
  { key: "varietal", label: "Varietal" },
  { key: "region", label: "Region" },
  { key: "quantity", label: "Qty" },
  { key: "pricePaid", label: "Price Paid" },
  { key: "currentValue", label: "Current Value" },
  { key: "rating", label: "Rating" },
  { key: "drinkFrom", label: "Drink From" },
  { key: "drinkTo", label: "Drink To" },
  { key: "drinkWindowRange", label: "Drinking Window (range, e.g. 2000–2030)" },
  { key: "idealOpeningYear", label: "Ideal Opening Year" },
  { key: "stage", label: "Stage" },
  { key: "manualStatus", label: "Drink/Hold Call" },
  { key: "purchaseDate", label: "Purchase Date" },
  { key: "openedDate", label: "Opened / Consumed Date" },
  { key: "notes", label: "Notes" },
];

const ALIASES = {
  producer: ["producer", "winery", "estate", "domaine", "chateau"],
  name: ["wine", "name", "wine name", "cuvee", "label"],
  vintage: ["vintage", "year"],
  type: ["type", "color", "colour", "category"],
  varietal: ["varietal", "grape", "variety", "blend"],
  region: ["region", "appellation", "country", "location"],
  quantity: ["quantity", "qty", "bottles", "count", "on hand"],
  pricePaid: ["price paid", "purchase price", "price", "cost", "paid", "amount paid"],
  currentValue: ["current value", "value", "market value", "worth"],
  rating: ["rating", "score", "points"],
  drinkFrom: ["drink from", "drink start", "window from", "drink window start"],
  drinkTo: ["drink to", "drink end", "drink by", "window to", "drink window end"],
  drinkWindowRange: ["drinking window", "drink window", "window"],
  idealOpeningYear: ["ideal opening year", "ideal open year", "opening year"],
  stage: ["stage", "phase", "maturity"],
  manualStatus: ["drink/hold", "drink hold", "drink or hold", "status"],
  purchaseDate: ["purchase date", "date purchased", "bought", "date acquired"],
  openedDate: ["opened date", "date opened", "consumed date", "date consumed", "drank date", "date drank"],
  notes: ["notes", "comments", "tasting notes", "tasting note"],
};

const emptyWine = () => ({
  id: crypto.randomUUID(),
  producer: "", name: "", vintage: "", type: "Red", varietal: "", region: "",
  quantity: 1, pricePaid: "", currentValue: "", rating: "", drinkFrom: "", drinkTo: "",
  idealOpeningYear: "", stage: "", manualStatus: "", purchaseDate: "", openedDate: "", notes: "",
});

function detectField(header) {
  const h = header.trim().toLowerCase();
  let best = null, bestLen = 0;
  for (const [field, aliases] of Object.entries(ALIASES)) {
    for (const alias of aliases) {
      if (h === alias) return field;
      if ((h.includes(alias) || alias.includes(h)) && alias.length > bestLen) {
        best = field; bestLen = alias.length;
      }
    }
  }
  return best;
}

function parsePasted(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if (lines.length === 0) return { headers: [], rows: [] };
  const delim = lines[0].includes("\t") ? "\t" : ",";
  const headers = lines[0].split(delim).map(h => h.trim());
  const rows = lines.slice(1).map(l => l.split(delim).map(c => c.trim()));
  return { headers, rows };
}

function toNum(v) {
  if (v === undefined || v === null || v === "") return NaN;
  const cleaned = String(v).replace(/[^0-9.\-]/g, "");
  return cleaned === "" ? NaN : parseFloat(cleaned);
}

function cleanNumber(v) {
  if (v === undefined || v === null) return v;
  return String(v).replace(/[^0-9.\-]/g, "");
}

const NUMERIC_FIELDS = ["quantity", "pricePaid", "currentValue", "rating", "idealOpeningYear"];

function drinkStatus(w) {
  if (w.manualStatus) {
    const s = w.manualStatus.toUpperCase();
    const tone = s.includes("HOLD") ? "hold" : s.includes("PAST") ? "past" : "ready";
    return { label: w.manualStatus, tone };
  }
  const year = new Date().getFullYear();
  const from = parseInt(w.drinkFrom), to = parseInt(w.drinkTo);
  if (!from && !to) return null;
  if (from && year < from) return { label: "Hold", tone: "hold" };
  if (to && year > to) return { label: "Past peak", tone: "past" };
  return { label: "Drink now", tone: "ready" };
}

function EditableCell({ value, displayValue, onSave, type = "text", placeholder = "—" }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value ?? "");
  useEffect(() => { setVal(value ?? ""); }, [value]);

  if (editing) {
    return (
      <input
        autoFocus
        type={type}
        className="cell-input"
        value={val}
        onChange={e => setVal(e.target.value)}
        onBlur={() => { setEditing(false); if (val !== (value ?? "")) onSave(val); }}
        onKeyDown={e => {
          if (e.key === "Enter") e.currentTarget.blur();
          if (e.key === "Escape") { setVal(value ?? ""); setEditing(false); }
        }}
      />
    );
  }
  const shown = displayValue !== undefined ? displayValue : (value || placeholder);
  return <span className="editable-cell" onClick={() => setEditing(true)}>{shown}</span>;
}

function WineCollection() {
  const [wines, setWines] = useState([]);
  const [archive, setArchive] = useState([]);
  const [view, setView] = useState("cellar"); // 'cellar' | 'archive'
  const [loaded, setLoaded] = useState(false);
  const [search, setSearch] = useState("");
  const [sort, setSort] = useState({ key: "producer", dir: 1 });
  const [modal, setModal] = useState(null); // 'add' | 'edit' | 'import' | null
  const [editing, setEditing] = useState(null);
  const [importText, setImportText] = useState("");
  const [importMap, setImportMap] = useState({});
  const [importPreview, setImportPreview] = useState(null);
  const [importTarget, setImportTarget] = useState("cellar"); // 'cellar' | 'archive'
  const [saveError, setSaveError] = useState(false);
  const [filterType, setFilterType] = useState("All");
  const [consuming, setConsuming] = useState(null);
  const [consumeForm, setConsumeForm] = useState({ qty: 1, rating: "", notes: "", date: "" });

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("wine-collection", false);
        setWines(res ? JSON.parse(res.value) : []);
      } catch {
        setWines([]);
      }
      try {
        const res2 = await window.storage.get("wine-archive", false);
        setArchive(res2 ? JSON.parse(res2.value) : []);
      } catch {
        setArchive([]);
      }
      setLoaded(true);
    })();
  }, []);

  const persist = async (next) => {
    setWines(next);
    try {
      const res = await window.storage.set("wine-collection", JSON.stringify(next), false);
      setSaveError(!res);
    } catch {
      setSaveError(true);
    }
  };

  const persistArchive = async (next) => {
    setArchive(next);
    try {
      const res = await window.storage.set("wine-archive", JSON.stringify(next), false);
      setSaveError(!res);
    } catch {
      setSaveError(true);
    }
  };

  const stats = useMemo(() => {
    const totalBottles = wines.reduce((s, w) => s + (toNum(w.quantity) || 0), 0);
    const totalValue = wines.reduce((s, w) => {
      const v = toNum(w.currentValue) || toNum(w.pricePaid) || 0;
      return s + v * (toNum(w.quantity) || 0);
    }, 0);
    const rated = wines.filter(w => w.rating !== "" && !isNaN(toNum(w.rating)));
    const avgRating = rated.length ? rated.reduce((s, w) => s + toNum(w.rating), 0) / rated.length : null;
    const regions = new Set(wines.map(w => w.region).filter(Boolean));
    return { totalBottles, totalValue, avgRating, regions: regions.size };
  }, [wines]);

  const archiveStats = useMemo(() => {
    const totalConsumed = archive.reduce((s, w) => s + (toNum(w.quantity) || 1), 0);
    const rated = archive.filter(w => w.rating !== "" && !isNaN(toNum(w.rating)));
    const avgRating = rated.length ? rated.reduce((s, w) => s + toNum(w.rating), 0) / rated.length : null;
    const thisYear = archive.filter(w => w.openedDate && new Date(w.openedDate).getFullYear() === new Date().getFullYear())
      .reduce((s, w) => s + (toNum(w.quantity) || 1), 0);
    const regions = new Set(archive.map(w => w.region).filter(Boolean));
    return { totalConsumed, avgRating, thisYear, regions: regions.size };
  }, [archive]);

  const filtered = useMemo(() => {
    let list = view === "cellar" ? wines : archive;
    if (view === "cellar" && filterType !== "All") list = list.filter(w => w.type === filterType);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(w =>
        [w.producer, w.name, w.region, w.varietal, w.notes].join(" ").toLowerCase().includes(q)
      );
    }
    const { key, dir } = sort;
    return [...list].sort((a, b) => {
      let av = a[key], bv = b[key];
      const na = toNum(av), nb = toNum(bv);
      if (!isNaN(na) && !isNaN(nb) && av !== "" && bv !== "") { av = na; bv = nb; }
      else { av = (av || "").toString().toLowerCase(); bv = (bv || "").toString().toLowerCase(); }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return 0;
    });
  }, [wines, archive, view, search, sort, filterType]);

  const toggleSort = (key) => {
    setSort(s => s.key === key ? { key, dir: -s.dir } : { key, dir: 1 });
  };

  const openAdd = () => { setEditing(emptyWine()); setModal("add"); };
  const openEdit = (w) => { setEditing({ ...w }); setModal("edit"); };
  const saveEditing = () => {
    if (modal === "add") persist([...wines, editing]);
    else persist(wines.map(w => w.id === editing.id ? editing : w));
    setModal(null); setEditing(null);
  };
  const removeWine = (id) => persist(wines.filter(w => w.id !== id));
  const removeArchived = (id) => persistArchive(archive.filter(w => w.id !== id));
  const updateWineField = (id, field, val) => persist(wines.map(w => w.id === id ? { ...w, [field]: val } : w));
  const updateArchiveField = (id, field, val) => persistArchive(archive.map(w => w.id === id ? { ...w, [field]: val } : w));

  const openConsume = (w) => {
    setConsuming(w);
    setConsumeForm({
      qty: 1,
      rating: w.rating || "",
      notes: "",
      date: new Date().toISOString().slice(0, 10),
    });
  };

  const confirmConsume = () => {
    const currentQty = parseFloat(consuming.quantity) || 1;
    const qty = Math.max(1, Math.min(parseFloat(consumeForm.qty) || 1, currentQty));
    const remaining = currentQty - qty;
    const archiveEntry = {
      ...consuming,
      id: crypto.randomUUID(),
      quantity: qty,
      rating: consumeForm.rating,
      notes: consumeForm.notes ? consumeForm.notes : consuming.notes,
      openedDate: consumeForm.date,
    };
    persistArchive([...archive, archiveEntry]);
    if (remaining > 0) {
      persist(wines.map(w => w.id === consuming.id ? { ...w, quantity: remaining } : w));
    } else {
      persist(wines.filter(w => w.id !== consuming.id));
    }
    setConsuming(null);
  };

  const runDetect = (text) => {
    const { headers } = parsePasted(text);
    const map = {};
    headers.forEach((h, i) => { map[i] = detectField(h) || "ignore"; });
    setImportMap(map);
  };

  const buildPreview = () => {
    const { headers, rows } = parsePasted(importText);
    setImportPreview({ headers, rows });
  };

  const confirmImport = () => {
    const { rows } = parsePasted(importText);
    const newWines = rows.map(row => {
      const w = emptyWine();
      row.forEach((cell, i) => {
        const field = importMap[i];
        if (!field || field === "ignore") return;
        if (field === "drinkWindowRange") {
          const parts = cell.split(/[–—-]/).map(p => p.trim()).filter(Boolean);
          if (parts.length >= 2) { w.drinkFrom = cleanNumber(parts[0]); w.drinkTo = cleanNumber(parts[1]); }
          else if (parts.length === 1) { w.drinkFrom = cleanNumber(parts[0]); }
        } else if (NUMERIC_FIELDS.includes(field)) {
          w[field] = cleanNumber(cell);
        } else {
          w[field] = cell;
        }
      });
      if (!w.type || !TYPES.includes(w.type)) w.type = "Red";
      w.quantity = w.quantity || 1;
      return w;
    }).filter(w => w.producer || w.name);
    if (importTarget === "archive") {
      persistArchive([...archive, ...newWines]);
    } else {
      persist([...wines, ...newWines]);
    }
    setModal(null); setImportText(""); setImportMap({}); setImportPreview(null); setImportTarget("cellar");
  };

  if (!loaded) return <div style={{ padding: 40, color: "#8a7f6d" }}>Loading your cellar…</div>;

  return (
    <div className="cellar-root">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
        .cellar-root {
          --bg: #14181A;
          --bg-raised: #1B2124;
          --wine: #7A2438;
          --wine-bright: #9B3049;
          --gold: #C9A659;
          --parchment: #E9E2D4;
          --parchment-dim: #9B927F;
          --hairline: #2B3134;
          font-family: 'Inter', sans-serif;
          background: var(--bg);
          color: var(--parchment);
          min-height: 100%;
          padding: 32px 28px 48px;
          border-radius: 12px;
        }
        .cellar-root * { box-sizing: border-box; }
        .cellar-h1 {
          font-family: 'Fraunces', serif;
          font-optical-sizing: auto;
          font-weight: 700;
          font-size: 34px;
          letter-spacing: -0.01em;
          color: var(--parchment);
          margin: 0;
        }
        .cellar-sub { color: var(--parchment-dim); font-size: 13px; margin-top: 4px; }
        .stats-row {
          display: flex; gap: 0; margin-top: 22px; border-top: 1px solid var(--hairline);
          border-bottom: 1px solid var(--hairline);
        }
        .stat {
          flex: 1; padding: 14px 18px; border-right: 1px solid var(--hairline);
        }
        .stat:last-child { border-right: none; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--parchment-dim); }
        .stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; color: var(--gold); margin-top: 4px; }
        .toolbar { display: flex; gap: 10px; align-items: center; margin: 22px 0 16px; flex-wrap: wrap; }
        .search-wrap { position: relative; flex: 1; min-width: 180px; }
        .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--parchment-dim); }
        .search-input {
          width: 100%; background: var(--bg-raised); border: 1px solid var(--hairline); color: var(--parchment);
          padding: 9px 12px 9px 34px; border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif;
        }
        .search-input:focus { outline: none; border-color: var(--wine-bright); }
        select.type-filter {
          background: var(--bg-raised); border: 1px solid var(--hairline); color: var(--parchment);
          padding: 9px 12px; border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif;
        }
        .btn {
          display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 6px;
          font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; font-family: 'Inter', sans-serif;
        }
        .btn-primary { background: var(--wine); color: var(--parchment); }
        .btn-primary:hover { background: var(--wine-bright); }
        .btn-ghost { background: transparent; border-color: var(--hairline); color: var(--parchment); }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
        table.ledger { width: 100%; border-collapse: collapse; font-size: 13.5px; }
        .ledger th {
          text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
          color: var(--parchment-dim); padding: 8px 10px; border-bottom: 1px solid var(--hairline);
          cursor: pointer; user-select: none; white-space: nowrap;
        }
        .ledger th:hover { color: var(--gold); }
        .ledger td { padding: 10px; border-bottom: 1px solid var(--hairline); vertical-align: middle; }
        .ledger tr:hover td { background: rgba(255,255,255,0.02); }
        .wine-name-cell { display: flex; align-items: center; gap: 8px; }
        .type-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        .badge { font-size: 10.5px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
        .badge-hold { background: rgba(201,166,89,0.15); color: var(--gold); }
        .badge-ready { background: rgba(122,36,56,0.25); color: #E0A199; }
        .badge-past { background: rgba(155,146,127,0.15); color: var(--parchment-dim); }
        .row-actions { display: flex; gap: 6px; opacity: 0; }
        .ledger tr:hover .row-actions { opacity: 1; }
        .icon-btn { background: none; border: none; color: var(--parchment-dim); cursor: pointer; padding: 4px; }
        .icon-btn:hover { color: var(--gold); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--parchment-dim); }
        .modal-overlay {
          position: fixed; inset: 0; background: rgba(10,12,13,0.7); display: flex;
          align-items: center; justify-content: center; z-index: 50; padding: 20px;
        }
        .modal {
          background: var(--bg-raised); border: 1px solid var(--hairline); border-radius: 10px;
          padding: 24px; width: 100%; max-width: 640px; max-height: 85vh; overflow-y: auto;
        }
        .modal-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; margin: 0 0 18px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-field { display: flex; flex-direction: column; gap: 5px; grid-column: span 1; }
        .form-field.full { grid-column: span 2; }
        .form-field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--parchment-dim); }
        .form-field input, .form-field select, .form-field textarea {
          background: var(--bg); border: 1px solid var(--hairline); color: var(--parchment);
          padding: 8px 10px; border-radius: 5px; font-size: 14px; font-family: 'Inter', sans-serif;
        }
        .form-field textarea { resize: vertical; min-height: 60px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
        .import-textarea {
          width: 100%; min-height: 120px; background: var(--bg); border: 1px solid var(--hairline);
          color: var(--parchment); padding: 10px; border-radius: 6px; font-family: 'IBM Plex Mono', monospace;
          font-size: 12.5px;
        }
        .map-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--hairline); }
        .map-row .col-name { flex: 1; font-size: 13px; color: var(--parchment-dim); }
        .map-row select {
          background: var(--bg); border: 1px solid var(--hairline); color: var(--parchment);
          padding: 6px 8px; border-radius: 5px; font-size: 13px;
        }
        .save-warning { display: flex; gap: 8px; align-items: center; color: #E0A199; font-size: 12.5px; margin-top: 10px; }
        .tabs { display: flex; gap: 4px; margin-top: 22px; }
        .tab-btn {
          background: none; border: none; color: var(--parchment-dim); font-family: 'Inter', sans-serif;
          font-size: 13px; font-weight: 500; padding: 8px 4px; cursor: pointer; border-bottom: 2px solid transparent;
          margin-right: 18px;
        }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .consumed-note { font-style: italic; color: var(--parchment-dim); }
        .editable-cell { cursor: text; border-bottom: 1px dashed transparent; padding-bottom: 1px; }
        .editable-cell:hover { border-bottom-color: var(--gold); }
        .cell-input {
          width: 100%; background: var(--bg); border: 1px solid var(--gold); color: var(--parchment);
          padding: 4px 6px; border-radius: 4px; font-size: 13.5px; font-family: 'Inter', sans-serif;
        }
        .ledger td.mono .cell-input { font-family: 'IBM Plex Mono', monospace; }
      `}</style>

      <div className="cellar-h1">The Cellar Ledger</div>
      <div className="cellar-sub">
        {view === "cellar"
          ? `${wines.length} ${wines.length === 1 ? "entry" : "entries"} on hand`
          : `${archive.length} ${archive.length === 1 ? "entry" : "entries"} in the archive`}
      </div>

      <div className="tabs">
        <button className={`tab-btn ${view === "cellar" ? "active" : ""}`} onClick={() => setView("cellar")}>Cellar</button>
        <button className={`tab-btn ${view === "archive" ? "active" : ""}`} onClick={() => setView("archive")}>Archive</button>
      </div>

      {view === "cellar" ? (
        <div className="stats-row">
          <div className="stat"><div className="stat-label">Bottles</div><div className="stat-value">{stats.totalBottles}</div></div>
          <div className="stat"><div className="stat-label">Est. Value</div><div className="stat-value">${stats.totalValue.toFixed(0)}</div></div>
          <div className="stat"><div className="stat-label">Avg Rating</div><div className="stat-value">{stats.avgRating ? stats.avgRating.toFixed(1) : "—"}</div></div>
          <div className="stat"><div className="stat-label">Regions</div><div className="stat-value">{stats.regions}</div></div>
        </div>
      ) : (
        <div className="stats-row">
          <div className="stat"><div className="stat-label">Consumed</div><div className="stat-value">{archiveStats.totalConsumed}</div></div>
          <div className="stat"><div className="stat-label">Avg Rating</div><div className="stat-value">{archiveStats.avgRating ? archiveStats.avgRating.toFixed(1) : "—"}</div></div>
          <div className="stat"><div className="stat-label">This Year</div><div className="stat-value">{archiveStats.thisYear}</div></div>
          <div className="stat"><div className="stat-label">Regions</div><div className="stat-value">{archiveStats.regions}</div></div>
        </div>
      )}

      <div className="toolbar">
        <div className="search-wrap">
          <Search size={15} />
          <input className="search-input" placeholder={view === "cellar" ? "Search producer, wine, region, notes…" : "Search the archive…"}
            value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        {view === "cellar" && (
          <select className="type-filter" value={filterType} onChange={e => setFilterType(e.target.value)}>
            <option>All</option>
            {TYPES.map(t => <option key={t}>{t}</option>)}
          </select>
        )}
        <button className="btn btn-ghost" onClick={() => { setImportTarget(view); setModal("import"); }}><Upload size={15} /> Import</button>
        {view === "cellar" && <button className="btn btn-primary" onClick={openAdd}><Plus size={15} /> Add Bottle</button>}
      </div>

      {saveError && (
        <div className="save-warning"><AlertCircle size={14} /> Couldn't save last change — your data may not persist.</div>
      )}

      {filtered.length === 0 ? (
        <div className="empty-state">
          <WineIcon size={28} style={{ marginBottom: 10, opacity: 0.5 }} />
          <div>
            {view === "cellar"
              ? (wines.length === 0 ? "Your cellar is empty. Add a bottle or import your spreadsheet." : "No bottles match your search.")
              : (archive.length === 0 ? "Nothing archived yet. Mark a bottle as consumed, or import your historical archive." : "No entries match your search.")}
          </div>
        </div>
      ) : view === "cellar" ? (
        <table className="ledger">
          <thead>
            <tr>
              {[["producer","Producer"],["name","Wine"],["vintage","Vintage"],["region","Region"],
                ["quantity","Qty"],["currentValue","Value"],["rating","Rating"],["stage","Stage"],["drinkFrom","Window"]].map(([key,label]) => (
                <th key={key} onClick={() => toggleSort(key)}>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>{label}<ArrowUpDown size={11} /></span>
                </th>
              ))}
              <th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(w => {
              const status = drinkStatus(w);
              return (
                <tr key={w.id}>
                  <td><EditableCell value={w.producer} onSave={val => updateWineField(w.id, "producer", val)} /></td>
                  <td>
                    <div className="wine-name-cell">
                      <span className="type-dot" style={{ background: TYPE_COLORS[w.type] || "#888" }} />
                      <EditableCell value={w.name} onSave={val => updateWineField(w.id, "name", val)} />
                    </div>
                  </td>
                  <td className="mono"><EditableCell value={w.vintage} onSave={val => updateWineField(w.id, "vintage", cleanNumber(val))} /></td>
                  <td><EditableCell value={w.region} onSave={val => updateWineField(w.id, "region", val)} /></td>
                  <td className="mono"><EditableCell type="number" value={w.quantity} onSave={val => updateWineField(w.id, "quantity", val)} /></td>
                  <td className="mono">
                    <EditableCell
                      type="number"
                      value={w.currentValue}
                      displayValue={w.currentValue || w.pricePaid ? `$${(toNum(w.currentValue || w.pricePaid) || 0).toFixed(0)}` : "—"}
                      onSave={val => updateWineField(w.id, "currentValue", cleanNumber(val))}
                    />
                  </td>
                  <td className="mono"><EditableCell type="number" value={w.rating} onSave={val => updateWineField(w.id, "rating", cleanNumber(val))} /></td>
                  <td><EditableCell value={w.stage} onSave={val => updateWineField(w.id, "stage", val)} /></td>
                  <td>{status ? <span className={`badge badge-${status.tone}`}>{status.label}</span> : "—"}</td>
                  <td>
                    <div className="row-actions">
                      <button className="icon-btn" title="Mark as consumed" onClick={() => openConsume(w)}><ArchiveIcon size={14} /></button>
                      <button className="icon-btn" onClick={() => openEdit(w)}><Pencil size={14} /></button>
                      <button className="icon-btn" onClick={() => removeWine(w.id)}><Trash2 size={14} /></button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      ) : (
        <table className="ledger">
          <thead>
            <tr>
              {[["producer","Producer"],["name","Wine"],["vintage","Vintage"],["region","Region"],
                ["rating","Rating"],["openedDate","Consumed"],["notes","Notes"]].map(([key,label]) => (
                <th key={key} onClick={() => toggleSort(key)}>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>{label}<ArrowUpDown size={11} /></span>
                </th>
              ))}
              <th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(w => (
              <tr key={w.id}>
                <td><EditableCell value={w.producer} onSave={val => updateArchiveField(w.id, "producer", val)} /></td>
                <td>
                  <div className="wine-name-cell">
                    <span className="type-dot" style={{ background: TYPE_COLORS[w.type] || "#888" }} />
                    <EditableCell value={w.name} onSave={val => updateArchiveField(w.id, "name", val)} />
                  </div>
                </td>
                <td className="mono"><EditableCell value={w.vintage} onSave={val => updateArchiveField(w.id, "vintage", cleanNumber(val))} /></td>
                <td><EditableCell value={w.region} onSave={val => updateArchiveField(w.id, "region", val)} /></td>
                <td className="mono"><EditableCell type="number" value={w.rating} onSave={val => updateArchiveField(w.id, "rating", cleanNumber(val))} /></td>
                <td className="mono"><EditableCell type="date" value={w.openedDate} onSave={val => updateArchiveField(w.id, "openedDate", val)} /></td>
                <td className="consumed-note"><EditableCell value={w.notes} onSave={val => updateArchiveField(w.id, "notes", val)} /></td>
                <td>
                  <div className="row-actions">
                    <button className="icon-btn" onClick={() => removeArchived(w.id)}><Trash2 size={14} /></button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {(modal === "add" || modal === "edit") && editing && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">{modal === "add" ? "Add Bottle" : "Edit Bottle"}</div>
            <div className="form-grid">
              <div className="form-field"><label>Producer</label><input value={editing.producer} onChange={e => setEditing({ ...editing, producer: e.target.value })} /></div>
              <div className="form-field"><label>Wine Name</label><input value={editing.name} onChange={e => setEditing({ ...editing, name: e.target.value })} /></div>
              <div className="form-field"><label>Vintage</label><input value={editing.vintage} onChange={e => setEditing({ ...editing, vintage: e.target.value })} /></div>
              <div className="form-field">
                <label>Type</label>
                <select value={editing.type} onChange={e => setEditing({ ...editing, type: e.target.value })}>
                  {TYPES.map(t => <option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="form-field"><label>Varietal</label><input value={editing.varietal} onChange={e => setEditing({ ...editing, varietal: e.target.value })} /></div>
              <div className="form-field"><label>Region</label><input value={editing.region} onChange={e => setEditing({ ...editing, region: e.target.value })} /></div>
              <div className="form-field"><label>Quantity</label><input type="number" value={editing.quantity} onChange={e => setEditing({ ...editing, quantity: e.target.value })} /></div>
              <div className="form-field"><label>Rating (0-100)</label><input type="number" value={editing.rating} onChange={e => setEditing({ ...editing, rating: e.target.value })} /></div>
              <div className="form-field"><label>Price Paid ($)</label><input type="number" value={editing.pricePaid} onChange={e => setEditing({ ...editing, pricePaid: e.target.value })} /></div>
              <div className="form-field"><label>Current Value ($)</label><input type="number" value={editing.currentValue} onChange={e => setEditing({ ...editing, currentValue: e.target.value })} /></div>
              <div className="form-field"><label>Drink From (year)</label><input value={editing.drinkFrom} onChange={e => setEditing({ ...editing, drinkFrom: e.target.value })} /></div>
              <div className="form-field"><label>Drink To (year)</label><input value={editing.drinkTo} onChange={e => setEditing({ ...editing, drinkTo: e.target.value })} /></div>
              <div className="form-field"><label>Ideal Opening Year</label><input value={editing.idealOpeningYear} onChange={e => setEditing({ ...editing, idealOpeningYear: e.target.value })} /></div>
              <div className="form-field"><label>Stage</label><input placeholder="e.g. Late Peak" value={editing.stage} onChange={e => setEditing({ ...editing, stage: e.target.value })} /></div>
              <div className="form-field"><label>Drink/Hold Call</label><input placeholder="e.g. DRINK NOW" value={editing.manualStatus} onChange={e => setEditing({ ...editing, manualStatus: e.target.value })} /></div>
              <div className="form-field"><label>Purchase Date</label><input type="date" value={editing.purchaseDate} onChange={e => setEditing({ ...editing, purchaseDate: e.target.value })} /></div>
              <div className="form-field"><label>Opened Date</label><input type="date" value={editing.openedDate} onChange={e => setEditing({ ...editing, openedDate: e.target.value })} /></div>
              <div className="form-field full"><label>Notes</label><textarea value={editing.notes} onChange={e => setEditing({ ...editing, notes: e.target.value })} /></div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveEditing}><Check size={15} /> Save</button>
            </div>
          </div>
        </div>
      )}

      {modal === "import" && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 720 }}>
            <div className="modal-title">Import from Spreadsheet</div>
            {!importPreview ? (
              <>
                <div className="form-field" style={{ marginBottom: 12 }}>
                  <label>Import into</label>
                  <select value={importTarget} onChange={e => setImportTarget(e.target.value)}>
                    <option value="cellar">Cellar (bottles on hand)</option>
                    <option value="archive">Archive (bottles already consumed)</option>
                  </select>
                </div>
                <p style={{ fontSize: 13, color: "var(--parchment-dim)", marginTop: 0 }}>
                  Copy a range of cells (including the header row) from your spreadsheet and paste below.
                </p>
                <textarea
                  className="import-textarea"
                  placeholder="Producer	Wine	Vintage	Region	Qty	Price..."
                  value={importText}
                  onChange={e => { setImportText(e.target.value); runDetect(e.target.value); }}
                />
                <div className="modal-actions">
                  <button className="btn btn-ghost" onClick={() => setModal(null)}>Cancel</button>
                  <button className="btn btn-primary" disabled={!importText.trim()} onClick={buildPreview}>Next: Map Columns</button>
                </div>
              </>
            ) : (
              <>
                <p style={{ fontSize: 13, color: "var(--parchment-dim)", marginTop: 0 }}>
                  Confirm what each column maps to. {importPreview.rows.length} row(s) detected.
                </p>
                {importPreview.headers.map((h, i) => (
                  <div className="map-row" key={i}>
                    <div className="col-name">"{h}"</div>
                    <select value={importMap[i] || "ignore"} onChange={e => setImportMap({ ...importMap, [i]: e.target.value })}>
                      <option value="ignore">Ignore</option>
                      {FIELD_DEFS.map(f => <option key={f.key} value={f.key}>{f.label}</option>)}
                    </select>
                  </div>
                ))}
                <div className="modal-actions">
                  <button className="btn btn-ghost" onClick={() => { setImportPreview(null); }}>Back</button>
                  <button className="btn btn-primary" onClick={confirmImport}><Check size={15} /> Import {importPreview.rows.length} into {importTarget === "archive" ? "Archive" : "Cellar"}</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {consuming && (
        <div className="modal-overlay" onClick={() => setConsuming(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 480 }}>
            <div className="modal-title">Mark Consumed</div>
            <p style={{ fontSize: 13, color: "var(--parchment-dim)", marginTop: 0 }}>
              {consuming.producer} {consuming.name} {consuming.vintage ? `· ${consuming.vintage}` : ""}
            </p>
            <div className="form-grid">
              {parseFloat(consuming.quantity) > 1 && (
                <div className="form-field full">
                  <label>Bottles Consumed</label>
                  <input type="number" min="1" max={consuming.quantity}
                    value={consumeForm.qty}
                    onChange={e => setConsumeForm({ ...consumeForm, qty: e.target.value })} />
                </div>
              )}
              <div className="form-field"><label>Rating (0-100)</label>
                <input type="number" value={consumeForm.rating} onChange={e => setConsumeForm({ ...consumeForm, rating: e.target.value })} />
              </div>
              <div className="form-field"><label>Date Consumed</label>
                <input type="date" value={consumeForm.date} onChange={e => setConsumeForm({ ...consumeForm, date: e.target.value })} />
              </div>
              <div className="form-field full"><label>Tasting Notes</label>
                <textarea autoFocus value={consumeForm.notes} onChange={e => setConsumeForm({ ...consumeForm, notes: e.target.value })} />
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setConsuming(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={confirmConsume}><ArchiveIcon size={15} /> Add to Archive</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<WineCollection />);
</script>
</body>
</html>
